<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gondola CV — Debug</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>img { width: 100%; border-radius: 8px; }</style>
</head>
<body>
  <main class="container">
    <hgroup>
      <h1>Debug view</h1>
      <p>The latest analyzed frame. Cyan = motion region (red pixels changed between frames).
         Yellow = queue polygon. Green boxes = people counted in the queue; gray = people elsewhere.</p>
    </hgroup>
    <img id="frame" src="/static/debug_frame.jpg" alt="Annotated debug frame">
    <p><a href="/">← Back to dashboard</a></p>
  </main>
  <script>
    setInterval(() => {
      document.getElementById("frame").src = "/static/debug_frame.jpg?" + Date.now();
    }, 15000);
  </script>
</body>
</html>
